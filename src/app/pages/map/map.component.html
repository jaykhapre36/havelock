<!-- ══ HERO ════════════════════════════════════════════════════════════════ -->
<section class="map-hero">
  <div class="container map-hero__inner">
    <p class="map-hero__eyebrow">Navigate the Park</p>
    <h1 class="map-hero__title">Park Map</h1>
    <p class="map-hero__sub">Explore all zones, rides, and facilities.</p>
  </div>
</section>

<!-- ══ MAIN ════════════════════════════════════════════════════════════════ -->
<section class="map-main section">
  <div class="container map-main__layout">

    <!-- LEFT: Map + Legend -->
    <div class="map-col">

      <!-- Google Map -->
      <div class="map-embed-wrap">
        <div class="map-embed-wrap__header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
          </svg>
          <span>Havelock Water Park — Valvod, Borsad, Gujarat</span>
          <a href="https://maps.app.goo.gl/d3cYnqRYXJJd83Kz9" target="_blank" class="map-embed-wrap__open">
            Open in Maps ↗
          </a>
        </div>
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3691.305650490588!2d72.90884047388174!3d22.30427737968371!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x395fb192d8d88ae5%3A0x4ee8aa1d168f8a35!2sThe%20Enjoy%20City%20-%20Waterpark%20%26%20adventure%20park!5e0!3m2!1sen!2sin!4v1773984536875!5m2!1sen!2sin"
          width="100%" height="420" style="border:0; display:block;"
          allowfullscreen="" loading="lazy"
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>
      </div>

      <!-- Facilities strip -->
      <div class="map-facilities">
        <p class="map-facilities__title">Park Facilities</p>
        <div class="map-facilities__grid">
          <div class="map-facility" *ngFor="let f of facilities">
            <span class="map-facility__icon">{{ f.icon }}</span>
            <span class="map-facility__label">{{ f.label }}</span>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT: Zone detail panel / zone list -->
    <aside class="map-sidebar">

      <!-- Get Directions card -->
      <div class="directions-card">
        <div class="directions-card__icon">📍</div>
        <h4 class="directions-card__title">Get Directions</h4>
        <p class="directions-card__addr">Mahisagar River Front, Near Jain Tirth,<br>Valvod, Borsad, Gujarat 388530</p>
        <a
          href="https://maps.app.goo.gl/d3cYnqRYXJJd83Kz9"
          target="_blank"
          class="directions-card__btn"
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
          Get Directions
        </a>
      </div>

    </aside>
  </div>
</section>

<a routerLink="/packages" class="float-book">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
    <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
  </svg>
  Book Tickets
</a>
