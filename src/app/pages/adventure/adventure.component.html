<!-- ── HERO ──────────────────────────────────────────────────────────────── -->
<section class="adventure-hero">
  <div class="container">
    <h1 class="adventure-hero__title">Adventure Park</h1>
    <p class="adventure-hero__sub">Push your limits. Face your fears. Own the moment.</p>
  </div>
</section>

<!-- ── MAIN ─────────────────────────────────────────────────────────────── -->
<section class="adventure-content section">
  <div class="container">

    <!-- Category filters -->
    <div class="adventure-filters">
      <button
        class="adventure-filter-btn"
        *ngFor="let cat of categories"
        [class.active]="activeCategory === cat"
        (click)="setCategory(cat)"
      >{{ cat }}</button>
    </div>

    <p class="adventure-count">Showing <strong>{{ filteredActivities.length }}</strong> activit{{ filteredActivities.length !== 1 ? 'ies' : 'y' }}</p>

    <!-- Empty state -->
    <div class="adventure-empty" *ngIf="filteredActivities.length === 0">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <p>No activities found in this category.</p>
      <button class="btn-outline" (click)="setCategory('All')">Show All</button>
    </div>

    <!-- Grid -->
    <div class="adventure-grid" *ngIf="filteredActivities.length > 0">
      <div class="adventure-card" *ngFor="let activity of filteredActivities">

        <!-- Image area -->
        <div
          class="adventure-card__img-wrap"
          [style.background-color]="getCategoryColor(activity.category)"
        >
          <img
            class="adventure-card__img"
            [src]="activity.image"
            [alt]="activity.name"
            loading="lazy"
          />
        </div>

        <!-- Card body -->
        <div class="adventure-card__body">
          <h3 class="adventure-card__name">{{ activity.name }}</h3>
          <p class="adventure-card__desc">{{ activity.description }}</p>

          <!-- Feature pills (max 2) -->
          <div class="adventure-card__features">
            <span
              class="adventure-card__feature-pill"
              *ngFor="let feat of activity.features.slice(0, 2)"
            >{{ feat }}</span>
          </div>

          <!-- <span class="adventure-card__cta">Learn More →</span> -->
        </div>

      </div>
    </div>

  </div>
</section>

<a routerLink="/packages" class="float-book">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
    <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
  </svg>
  Book Tickets
</a>
