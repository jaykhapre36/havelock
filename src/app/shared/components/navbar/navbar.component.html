<nav class="navbar" [class.scrolled]="isScrolled" [class.menu-open]="isMenuOpen">
  <div class="navbar__inner">

    <!-- Logo -->
    <a class="navbar__logo" routerLink="/" (click)="closeMenu()">
      <img src="mock-data/images/havelock_logo.jpeg" alt="Havelock Logo" class="navbar__logo-img" />
      <!-- <span class="navbar__logo-text">Havelock</span> -->
    </a>
    
    <!-- Desktop Nav Links -->
    <ul class="navbar__links">
      <li *ngFor="let link of navLinks">
        <a
          [routerLink]="link.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: link.exact }"
          class="navbar__link"
        >{{ link.label }}</a>
      </li>
      <li *ngIf="currentUser">
        <a routerLink="/my-bookings" routerLinkActive="active" class="navbar__link">Your Bookings</a>
      </li>
      <li *ngIf="currentUser">
        <a routerLink="/my-wallet" routerLinkActive="active" class="navbar__link">Your Wallet</a>
      </li>
      <li *ngIf="currentUser">
        <a routerLink="/my-extras" routerLinkActive="active" class="navbar__link">Locker & Costume</a>
      </li>
    </ul>

    <!-- Desktop Right Actions -->
    <div class="navbar__actions">
      <!-- Logged Out -->
      <ng-container *ngIf="!currentUser">
        <a routerLink="/auth/login" class="navbar__login-btn">Login</a>
        <a routerLink="/packages" class="navbar__book-btn btn-primary">Book Tickets</a>
      </ng-container>

      <!-- Logged In -->
      <ng-container *ngIf="currentUser">
        <div class="navbar__user">
          <div class="navbar__avatar">{{ currentUser.name.charAt(0) }}</div>
          <div class="navbar__user-dropdown">
            <span class="navbar__user-name">{{ currentUser.name }}</span>
            <button class="navbar__logout-btn" (click)="logout()">Logout</button>
          </div>
        </div>
        <a routerLink="/packages" class="navbar__book-btn btn-primary">Book Tickets</a>
      </ng-container>
    </div>

    <!-- Mobile Hamburger -->
    <button class="navbar__hamburger" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>

  <!-- Mobile Menu -->
  <div class="navbar__mobile-menu" [class.open]="isMenuOpen">
    <ul class="navbar__mobile-links">
      <li *ngFor="let link of navLinks">
        <a
          [routerLink]="link.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: link.exact }"
          class="navbar__mobile-link"
          (click)="closeMenu()"
        >{{ link.label }}</a>
      </li>
      <li *ngIf="currentUser">
        <a routerLink="/my-bookings" routerLinkActive="active" class="navbar__mobile-link" (click)="closeMenu()">Your Bookings</a>
      </li>
      <li *ngIf="currentUser">
        <a routerLink="/my-wallet" routerLinkActive="active" class="navbar__mobile-link" (click)="closeMenu()">Your Wallet</a>
      </li>
      <li *ngIf="currentUser">
        <a routerLink="/my-extras" routerLinkActive="active" class="navbar__mobile-link" (click)="closeMenu()">Locker & Costume</a>
      </li>
    </ul>
    <div class="navbar__mobile-actions">
      <ng-container *ngIf="!currentUser">
        <a routerLink="/auth/login" class="btn-outline" (click)="closeMenu()">Login</a>
        <a routerLink="/packages" class="btn-primary" (click)="closeMenu()">Book Tickets</a>
      </ng-container>
      <ng-container *ngIf="currentUser">
        <span class="navbar__mobile-greeting">Hi, {{ currentUser.name }}</span>
        <button class="btn-outline" (click)="logout()">Logout</button>
        <a routerLink="/packages" class="btn-primary" (click)="closeMenu()">Book Tickets</a>
      </ng-container>
    </div>
  </div>

  <!-- Mobile Overlay -->
  <div class="navbar__overlay" [class.visible]="isMenuOpen" (click)="closeMenu()"></div>
</nav>
